<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Body and Header */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, white, );
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        header {
            background-color: #008080;
            color: white;
            padding: 20px;
            text-align: center;
    
        }

        /* Navigation */
        nav {
            text-align: center;
            margin: 20px 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }
        nav a:hover {
            color: #008080;
        }

        /* Section */
        .section {
            padding: 20px;
            text-align: center;
        }

        /* Featured Content */
        .featured-content {
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        /* Animations */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Courses Page</h1>
    </header>

    <nav>
        <a href="home.html">Courses</a>
        <a href="upcoming_courses.html">Upcoming Courses/Workshops Section</a>
        <a href="ongoing_courses.html">Ongoing Courses</a>
    </nav>

    <section class="section">
        <div class="featured-content">
            <h2>Learn New Skills Anytime, Anywhere</h2>
            <p>Explore our upcoming and ongoing courses designed to help you achieve your goals.</p>
        </div>
    </section>
</body>
</html>
